<!DOCTYPE html>
<html>
<head>
    <!-- This sets your page title. You can change this to whatever you want! -->
    <title>Aerospace Jam Example</title>
    <!-- The below script tag is used to load socket.io from the server. -->
    <script src="{{ url_for('static', filename='js/socket.io.js') }}"></script>
<!--This script imports a library for creating graphs-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>
</head>
<body>
    <h1>Aerospace Jam Example</h1>
    <!-- Notice how the span that contains the placeholder value has an ID. We reference this ID later in the script, and it lets us pick this element in specific. -->
    <p><b>Random number chosen by the Pi: </b> <span id="randomNumber">Loading...</span></p>
    <p><b>Barometric Pressure: </b></p>
    <canvas id="barometricPressure" style="width:100%;max-width:700px;"></canvas>
    <button id="barometricPressureButton">Request Barometric Pressure</button>

    <p>Position and rotation graph:</p>
    <canvas id="positionGraph" style="width:100%;max-width:700px;"></canvas>
    <canvas id="rotationGraph" style="width:100%;max-width:700px;"></canvas>
    <p><b>(x, y, z, yaw, pitch, roll): </b> <span id="position">Loading...</span></p>

    <p>2D map</p>
    <button id="drawMap">Collect Map Data</button>
    <canvas id="map" style="width:100%;max-width:700px;"></canvas>

    <h2>Camera</h2>
    <img id="cameraImage" src="" alt="Live from Pi!" style="width: 640px; height: 480px; border: 1px solid black;">
    <script>
        // This function wrapper (addEventListener) makes the inner contents run only when the DOM (Document Object Model) content is loaded.
        // In simpler terms, this runs once the page has finished loading.
        document.addEventListener('DOMContentLoaded', function() {
            // Then, we connect to our webserver using two special variables - you don't need to worry about this either.
            var socket = io.connect('http://' + document.domain + ':' + location.port);

            var mapIsActive = false;
            // Now, we subscribe to the server's "update_data" events - this is sent every second by the background thread, but you can change both the events' names and the speed of these events being sent.
            socket.on('update_data', function(msg) {
                // Now, we get the span that we defined before by its ID...
                var randomNumberSpan = document.getElementById('randomNumber');
                // And we set its content to the random number we just got from the server.
                randomNumberSpan.textContent = msg.randomNumber;
                // For new sensors, we can really easily repeat this! For instance, if you added a piece to the data on the server side called "mySensor", as in the other example, you could do:
                // var mySensorSpan = document.getElementById('mySensor');
                // mySensorSpan.textContent = msg.mySensor;
                
                positionData = "(" + msg.position[0] + ", " + msg.position[1] + ", " + msg.position[2] + ", " + msg.position[3] + ", " + msg.position[4] + ", " + msg.position[5] + ")";
                document.getElementById('position').textContent = positionData;

                new Chart("barometricPressure", {
                    type: "line",
                    data: {
                        labels: Object.keys(msg.barometricPressure),
                        datasets: [{
                        backgroundColor:"rgba(0,0,255,1.0)",
                        borderColor: "rgba(0,0,255,0.1)",
                        data: Object.values(msg.barometricPressure)
                        }]
                    }
                });

                new Chart("positionGraph", {
                    type: "line",
                    data: {
                        labels: msg.accelerometer[0],
                        datasets: [{
                        data: msg.accelerometer[4],
                        borderColor: "red",
                        fill: false
                        },{
                        data: msg.accelerometer[5],
                        borderColor: "green",
                        fill: false
                        },{
                        data: msg.accelerometer[6],
                        borderColor: "blue",
                        fill: false
                        }]
                    },
                    options: {
                        legend: {display: true}
                    }
                });
                
                new Chart("rotationGraph", {
                    type: "line",
                    data: {
                        labels: msg.accelerometer[0],
                        datasets: [{
                        data: msg.accelerometer[1],
                        borderColor: "red",
                        fill: false
                        },{
                        data: msg.accelerometer[2],
                        borderColor: "green",
                        fill: false
                        },{
                        data: msg.accelerometer[3],
                        borderColor: "blue",
                        fill: false
                        }]
                    },
                    options: {
                        legend: {display: true}
                    }
                });

                new Chart("map", {
                    type: "scatter",
                    data: {
                        datasets: [{
                        pointRadius: 4,
                        pointBackgroundColor: "rgba(255, 255, 255, 1)",
                        data: msg.lidar
                        }]
                    }
                });
            });
            
            var barometricPressureButton = document.getElementById('barometricPressureButton');
            barometricPressureButton.addEventListener('click', function() {
                socket.emit('requstBarometricPressure');
            });

            var mapButton = document.getElementById('drawMap');
            mapButton.addEventListener('click', function() {
                socket.emit('drawMap');
                mapIsActive = !mapIsActive
                if(mapIsActive)
                    mapButton.textContent = "Stop Collecting Map Data"
                else
                    mapButton.textContent = "Collect Map Data"
            });

            var takePictureButton = document.getElementById('takePictureButton');
            var cameraImage = document.getElementById('cameraImage');

            socket.on('new_image', function(msg) {
                cameraImage.src = 'data:image/jpeg;base64,' + msg.image_data;
            });
        });
    </script>
</body>
</html>
